<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthEase - Pharmacy Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --he-dark: #0c3b5d;
            --he-mint: #c1e3df;
            --he-accent: #36b5ff;
            --he-light-bg: #f4f7f7;
            --he-panel-bg: #e7f4f2;
        }

        body { 
            background-color: var(--he-light-bg); 
            color: var(--he-dark); 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        
        .dashboard-header { 
            background-color: var(--he-mint); 
            padding: 1rem 1.5rem; 
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .he-card { 
            background: var(--he-panel-bg); 
            border-radius: 18px; 
            border: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            padding: 2rem; 
            height: 100%;
        }

        .he-title { font-weight: 700; color: var(--he-dark); }

        /* Search bar styling */
        .search-wrapper {
            position: relative;
            max-width: 300px;
        }
        .search-wrapper .bi-search {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #7a8a8a;
        }
        .he-search {
            border-radius: 999px;
            padding-left: 2.5rem;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Tabs Styling */
        .nav-pills .nav-link { 
            color: var(--he-dark); 
            font-weight: 600; 
            border-radius: 999px; 
            padding: 0.5rem 1.2rem; 
            border: 2px solid var(--he-dark);
            background: white;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            transition: 0.3s;
        }
        .nav-pills .nav-link.active { 
            background-color: var(--he-dark); 
            color: white; 
            border-color: var(--he-dark);
        }

        /* Stock Items Styling */
        .stock-item {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .stock-input {
            width: 80px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            text-align: center;
        }

        .order-card { 
            background: white; 
            border-radius: 15px; 
            padding: 1.25rem; 
            margin-bottom: 1rem; 
            border-left: 6px solid var(--he-accent);
        }
        
        .status-badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            border-radius: 999px;
            background-color: var(--he-dark);
            color: white;
        }
    </style>
</head>
<body>

    <header class="dashboard-header mb-4">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-4">
                <span class="he-title fs-4">HealthEase Dashboard</span>
                
                <div class="search-wrapper d-none d-md-block">
                    <i class="bi bi-search"></i>
                    <input type="text" id="dashboardSearch" class="form-control form-control-sm he-search" placeholder="Zoek medicijnen...">
                </div>
            </div>
            
            <button onclick="logout()" class="btn btn-sm btn-outline-dark rounded-pill">Logout</button>
        </div>
    </header>

    <main class="container-fluid px-md-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="he-card">
                    <h3 class="he-title mb-4">Voorraadbeheer</h3>

                    <ul class="nav nav-pills mb-4" id="stockTabs" role="tablist"></ul>

                    <div class="tab-content" id="stockTabContent"></div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="he-card">
                    <h3 class="he-title mb-4">Recente Bestellingen</h3>
                    <div id="ordersManage" style="max-height: 80vh; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const categories = [
            { name: 'Personal care' },
            { name: 'Diabetic Care' },
            { name: 'Supplements' },
            { name: 'Devices' },
            { name: 'Vitamins' },
            { name: 'First Aid' },
            { name: 'Allergy' },
            { name: 'Immune Support' },
            { name: 'Pain & Fever Relief' }
        ];

        let allProducts = [];
        let currentPharmacyStock = [];
        let currentPharmacyId = null;

        function requirePharmacy() {
            const raw = localStorage.getItem('he_user');
            if (!raw) { window.location.href = 'login.html'; return null; }
            const user = JSON.parse(raw);
            if (user.role !== 'PHARMACY') { window.location.href = 'index.html'; return null; }
            return user;
        }

        function logout() {
            localStorage.removeItem('he_user');
            localStorage.removeItem('he_token');
            window.location.href = 'index.html';
        }

        async function init() {
            const user = requirePharmacy();
            if (!user) return;
            
            const resPharma = await fetch('http://localhost:4000/api/pharmacies');
            const pharmacies = await resPharma.json();
            const match = pharmacies.find(p => p.email === user.email);
            currentPharmacyId = match ? match.id : user.pharmacyId;

            const prodRes = await fetch('http://localhost:4000/api/products');
            allProducts = await prodRes.json();

            setupTabs();
            await refreshStockData();
            await loadOrders();

            // Search listener
            document.getElementById('dashboardSearch').addEventListener('input', filterStock);
        }

        function setupTabs() {
            const tabList = document.getElementById('stockTabs');
            const tabContent = document.getElementById('stockTabContent');
            
            tabList.innerHTML = `<li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pane-all">Alle</button></li>`;
            tabContent.innerHTML = `<div class="tab-pane fade show active" id="pane-all"><div id="container-all"></div></div>`;

            categories.forEach(c => {
                const safeName = c.name.toLowerCase().replace(/[^a-z]/g, '');
                tabList.innerHTML += `<li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#pane-${safeName}">${c.name}</button></li>`;
                tabContent.innerHTML += `<div class="tab-pane fade" id="pane-${safeName}"><div id="container-${safeName}"></div></div>`;
            });
        }

        async function refreshStockData() {
            const tkn = localStorage.getItem('he_token');
            const res = await fetch(`http://localhost:4000/api/pharmacies/${currentPharmacyId}/stock`, {
                headers: { 'Authorization': 'Bearer ' + tkn }
            });
            currentPharmacyStock = await res.json();
            renderStock(allProducts);
        }

        function filterStock() {
            const term = document.getElementById('dashboardSearch').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(term) || 
                (p.category && p.category.toLowerCase().includes(term))
            );
            renderStock(filtered);
        }

        function renderStock(productsToShow) {
            // Leeg alle containers eerst
            document.getElementById('container-all').innerHTML = '';
            categories.forEach(c => {
                const safeName = c.name.toLowerCase().replace(/[^a-z]/g, '');
                const el = document.getElementById(`container-${safeName}`);
                if (el) el.innerHTML = '';
            });

            productsToShow.forEach(p => {
                const stockItem = currentPharmacyStock.find(s => s.productId === p.id);
                const qty = stockItem ? stockItem.quantity : 0;

                const html = `
                    <div class="stock-item shadow-sm">
                        <div class="d-flex align-items-center gap-3">
                            <img src="${p.imageUrl || 'https://via.placeholder.com/50'}" width="50" height="50" class="rounded" style="object-fit:cover">
                            <div>
                                <div class="fw-bold">${p.name}</div>
                                <div class="small text-muted">SRD ${Number(p.price).toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="d-flex gap-2 align-items-center">
                            <input type="number" class="form-control stock-input" id="qty-${p.id}" value="${qty}" min="0">
                            <button class="btn btn-sm btn-dark rounded-pill" onclick="saveStock(${p.id})">Save</button>
                        </div>
                    </div>
                `;

                document.getElementById('container-all').insertAdjacentHTML('beforeend', html);

                if (p.category) {
                    const safeCat = p.category.toLowerCase().replace(/[^a-z]/g, '');
                    const container = document.getElementById(`container-${safeCat}`);
                    if (container) container.insertAdjacentHTML('beforeend', html);
                }
            });
        }

        async function saveStock(productId) {
            const qty = document.getElementById(`qty-${productId}`).value;
            const tkn = localStorage.getItem('he_token');
            const res = await fetch(`http://localhost:4000/api/pharmacies/${currentPharmacyId}/stock`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tkn },
                body: JSON.stringify({ productId, quantity: Number(qty) })
            });
            if(res.ok) {
                // Update lokale data zodat search niet reset bij re-render
                const item = currentPharmacyStock.find(s => s.productId === productId);
                if(item) item.quantity = Number(qty);
                else currentPharmacyStock.push({ productId, quantity: Number(qty) });
                
                alert('Voorraad bijgewerkt!');
            }
        }

        async function loadOrders() {
            const tkn = localStorage.getItem('he_token');
            const res = await fetch(`http://localhost:4000/api/pharmacies/${currentPharmacyId}/orders`, {
                headers: { 'Authorization': 'Bearer ' + tkn }
            });
            const orders = await res.json();
            const container = document.getElementById('ordersManage');
            container.innerHTML = orders.length ? '' : '<p class="text-muted text-center py-4">Geen bestellingen gevonden.</p>';

            orders.reverse().forEach(o => {
                const el = document.createElement('div');
                el.className = 'order-card shadow-sm';
                el.innerHTML = `
                    <div class="d-flex justify-content-between align-items-start">
                        <h6 class="fw-bold mb-0">${o.customerName}</h6>
                        <span class="status-badge">${o.status || 'PENDING'}</span>
                    </div>
                    <div class="small text-muted mb-2">Order #${o.id}</div>
                    <div class="d-flex flex-wrap gap-1">
                        ${['READY', 'DELIVERED'].map(s => `
                            <button class="btn btn-sm btn-outline-secondary" style="font-size:10px" onclick="updateStatus(${o.id}, '${s}')">${s}</button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(el);
            });
        }

        async function updateStatus(orderId, status) {
            const tkn = localStorage.getItem('he_token');
            await fetch(`http://localhost:4000/api/orders/${orderId}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tkn },
                body: JSON.stringify({ status })
            });
            loadOrders();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
