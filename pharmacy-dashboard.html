<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthEase - Pharmacy Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --he-dark: #0c3b5d; --he-mint: #c1e3df; --he-accent: #36b5ff;
            --he-light-bg: #f4f7f7; --he-panel-bg: #e7f4f2;
        }
        body { background-color: var(--he-light-bg); color: var(--he-dark); font-family: system-ui, sans-serif; }
        .dashboard-header { background-color: var(--he-mint); padding: 1rem 1.5rem; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .he-card { background: var(--he-panel-bg); border-radius: 18px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 2rem; height: 100%; }
        .he-title { font-weight: 700; }
        .search-wrapper { position: relative; max-width: 300px; }
        .search-wrapper .bi-search { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #7a8a8a; }
        .he-search { border-radius: 999px; padding-left: 2.5rem; }
        .nav-pills .nav-link { color: var(--he-dark); font-weight: 600; border-radius: 999px; border: 2px solid var(--he-dark); background: white; margin-right: 0.5rem; margin-bottom: 0.5rem; }
        .nav-pills .nav-link.active { background-color: var(--he-dark); color: white; }
        .stock-item { background: white; border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.05); }
        .stock-input { width: 80px; text-align: center; border-radius: 8px; }
        .order-card { background: white; border-radius: 15px; padding: 1.25rem; margin-bottom: 1rem; border-left: 6px solid var(--he-accent); }
        .status-badge { font-size: 0.75rem; padding: 0.3rem 0.6rem; border-radius: 999px; background-color: var(--he-dark); color: white; }
        .status-ready-for-delivery { background: #e8dcff; color: #5b21b6; }
        .status-on-its-way { background: #d1ecf1; color: #0c5460; }
        .status-ready-for-pickup { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .order-toggle { border: none; background: transparent; color: var(--he-dark); padding: 0; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.35rem; font-weight: 600; margin-top: 0.9rem; }
        .order-toggle i { transition: transform 0.2s ease; }
        .order-toggle[aria-expanded="true"] i { transform: rotate(180deg); }
        .order-items { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid rgba(12,59,93,0.08); }
        .order-item { display: flex; justify-content: space-between; gap: 1rem; font-size: 0.92rem; margin-bottom: 0.4rem; }
        .order-costs { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px dashed rgba(12,59,93,0.12); }
        .order-cost-row { display: flex; justify-content: space-between; gap: 1rem; font-size: 0.92rem; margin-bottom: 0.35rem; }
        .order-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .order-filter-btn { border-radius: 999px; }
        .doc-preview-box { min-height: 250px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 12px; overflow: hidden; }
        .doc-preview-box img { max-width: 100%; max-height: 300px; object-fit: contain; }
    </style>
</head>
<body>

    <header class="dashboard-header mb-4">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-4">
                <span class="he-title fs-4">HealthEase Dashboard</span>
                <div class="search-wrapper d-none d-md-block">
                    <i class="bi bi-search"></i>
                    <input type="text" id="dashboardSearch" class="form-control form-control-sm he-search" placeholder="Zoek medicijnen...">
                </div>
                <button class="btn btn-sm btn-dark rounded-pill px-3 shadow-sm" data-bs-toggle="modal" data-bs-target="#addItemModal">
                    <i class="bi bi-plus-lg me-1"></i> Nieuw Item
                </button>
            </div>
            <button onclick="logout()" class="btn btn-sm btn-outline-dark rounded-pill">Logout</button>
        </div>
    </header>

    <main class="container-fluid px-md-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="he-card">
                    <h3 class="he-title mb-4">Voorraadbeheer</h3>
                    <ul class="nav nav-pills mb-4" id="stockTabs" role="tablist"></ul>
                    <div class="tab-content" id="stockTabContent"></div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="he-card">
                    <h3 class="he-title mb-4">Recente Bestellingen</h3>
                    <div class="order-filters" id="orderFilters">
                        <button type="button" class="btn btn-sm btn-dark order-filter-btn active" data-filter="ALL">All</button>
                        <button type="button" class="btn btn-sm btn-outline-dark order-filter-btn" data-filter="PENDING">Pending Orders</button>
                        <button type="button" class="btn btn-sm btn-outline-dark order-filter-btn" data-filter="READY_FOR_DELIVERY">Ready for Delivery</button>
                        <button type="button" class="btn btn-sm btn-outline-dark order-filter-btn" data-filter="ON_ITS_WAY">On Its Way</button>
                        <button type="button" class="btn btn-sm btn-outline-dark order-filter-btn" data-filter="READY_FOR_PICKUP">Ready for Pickup</button>
                    </div>
                    <div id="ordersManage" style="max-height: 80vh; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="addItemModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <form id="addItemForm">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="fw-bold">Nieuw Product Toevoegen</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">NAAM PRODUCT</label>
                            <input type="text" id="addName" class="form-control border-0 bg-light" required>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-bold">PRIJS (SRD)</label>
                                <input type="number" id="addPrice" step="0.01" class="form-control border-0 bg-light" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold">START VOORRAAD</label>
                                <input type="number" id="addQty" class="form-control border-0 bg-light" value="0" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">CATEGORIE</label>
                            <select id="addCategory" class="form-select border-0 bg-light">
                                <option value="Personal care">Personal care</option>
                                <option value="Vitamins">Vitamins</option>
                                <option value="First Aid">First Aid</option>
                                <option value="Pain & Fever Relief">Pain & Fever Relief</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4 pt-0">
                        <button type="submit" class="btn btn-dark w-100 py-3 rounded-3">Opslaan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewDocsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0">
                    <h5 class="fw-bold">Order Documenten</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <p class="small fw-bold text-muted mb-2">PRESCRIPTION</p>
                            <div id="prescriptionView" class="doc-preview-box"></div>
                        </div>
                        <div class="col-md-6">
                            <p class="small fw-bold text-muted mb-2">ID CARD</p>
                            <div id="idCardView" class="doc-preview-box"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deliveryDetailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold text-primary">Delivery Information</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="deliveryModalBody">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const categories = [{name:'Personal care'}, {name:'Vitamins'}, {name:'First Aid'}, {name:'Pain & Fever Relief'}];
        let allProducts = [], currentPharmacyStock = [], currentPharmacyId = null;
        let allOrders = [], currentOrderFilter = 'ALL';

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        function formatStatusLabel(status) {
            return String(status || '')
                .toLowerCase()
                .split('_')
                .map(part => part.charAt(0).toUpperCase() + part.slice(1))
                .join(' ');
        }

        function renderOrderDetails(order) {
            const itemsHtml = Array.isArray(order.items) && order.items.length
                ? `
                    <div class="order-items">
                        <div class="small fw-bold text-muted mb-2">BESTELDE ITEMS</div>
                        ${order.items.map(item => `
                            <div class="order-item">
                                <span>${item.productName} x${item.quantity}</span>
                                <span class="fw-semibold">SRD ${(Number(item.unitPrice) * Number(item.quantity)).toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                `
                : `<div class="small text-muted mt-3">Geen itemdetails beschikbaar.</div>`;

            const costsHtml = `
                <div class="order-costs">
                    <div class="small fw-bold text-muted mb-2">KOSTENOVERZICHT</div>
                    <div class="order-cost-row"><span>Bag total</span><span>SRD ${Number(order.bagTotal || 0).toFixed(2)}</span></div>
                    <div class="order-cost-row"><span>Admin fee</span><span>SRD ${Number(order.adminFee || 0).toFixed(2)}</span></div>
                    <div class="order-cost-row"><span>Platform fee</span><span>SRD ${Number(order.platformFee || 0).toFixed(2)}</span></div>
                    <div class="order-cost-row"><span>Delivery fee</span><span>SRD ${Number(order.deliveryFee || 0).toFixed(2)}</span></div>
                    <div class="order-cost-row fw-bold"><span>Total</span><span>SRD ${Number(order.totalAmount || 0).toFixed(2)}</span></div>
                </div>
            `;

            return itemsHtml + costsHtml;
        }

        function attachOrderToggles() {
            document.querySelectorAll('.order-toggle').forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-target');
                    const details = document.getElementById(targetId);
                    if (!details) return;
                    const expanded = btn.getAttribute('aria-expanded') === 'true';
                    btn.setAttribute('aria-expanded', String(!expanded));
                    details.hidden = expanded;
                });
            });
        }

        function attachOrderFilters() {
            document.querySelectorAll('.order-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentOrderFilter = btn.getAttribute('data-filter');
                    document.querySelectorAll('.order-filter-btn').forEach(other => {
                        other.classList.remove('btn-dark', 'active');
                        other.classList.add('btn-outline-dark');
                    });
                    btn.classList.remove('btn-outline-dark');
                    btn.classList.add('btn-dark', 'active');
                    renderOrders();
                });
            });
        }

        function attachCancelButtons() {
            document.querySelectorAll('.cancel-order-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('Weet je zeker dat je deze order wilt annuleren?')) return;
                    await updateStatus(btn.getAttribute('data-order-id'), 'CANCELLED');
                });
            });
        }

        async function init() {
            const raw = localStorage.getItem('he_user');
            if(!raw) return window.location.href = 'login.html';
            const user = JSON.parse(raw);
            
            const resPharma = await fetch('http://localhost:4000/api/pharmacies');
            const pharmacies = await resPharma.json();
            const match = pharmacies.find(p => p.email === user.email);
            currentPharmacyId = match ? match.id : user.pharmacyId;

            setupTabs();
            await refreshData();
            await loadOrders();

            document.getElementById('dashboardSearch').addEventListener('input', filterStock);
            document.getElementById('addItemForm').addEventListener('submit', addProduct);
            attachOrderFilters();
        }

        async function refreshData() {
            const tkn = localStorage.getItem('he_token');
            const [pRes, sRes] = await Promise.all([
                fetch('http://localhost:4000/api/products'),
                fetch(`http://localhost:4000/api/pharmacies/${currentPharmacyId}/stock`, { headers: { 'Authorization': 'Bearer ' + tkn }})
            ]);
            allProducts = await pRes.json();
            currentPharmacyStock = await sRes.json();
            renderStock(allProducts);
        }

        function setupTabs() {
            const tabList = document.getElementById('stockTabs');
            const tabContent = document.getElementById('stockTabContent');
            tabList.innerHTML = `<li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pane-all">Alle</button></li>`;
            tabContent.innerHTML = `<div class="tab-pane fade show active" id="pane-all"><div id="container-all"></div></div>`;

            categories.forEach(c => {
                const id = c.name.toLowerCase().replace(/[^a-z]/g, '');
                tabList.innerHTML += `<li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#pane-${id}">${c.name}</button></li>`;
                tabContent.innerHTML += `<div class="tab-pane fade" id="pane-${id}"><div id="container-${id}"></div></div>`;
            });
        }

        function filterStock() {
            const q = document.getElementById('dashboardSearch').value.toLowerCase();
            renderStock(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function renderStock(products) {
            document.querySelectorAll('[id^="container-"]').forEach(el => el.innerHTML = '');
            products.forEach(p => {
                const s = currentPharmacyStock.find(item => item.productId === p.id);
                const qty = s ? s.quantity : 0;
                const html = `
                    <div class="stock-item shadow-sm">
                        <div class="fw-bold">${p.name} <br><small class="text-muted">SRD ${Number(p.price).toFixed(2)}</small></div>
                        <div class="d-flex gap-2">
                            <input type="number" id="qty-${p.id}" class="form-control stock-input shadow-sm" value="${qty}">
                            <button class="btn btn-sm btn-dark" onclick="saveStock(${p.id})">Save</button>
                            <button class="btn btn-sm btn-outline-danger border-0" onclick="deleteProduct(${p.id})"><i class="bi bi-trash3"></i></button>
                        </div>
                    </div>`;
                document.getElementById('container-all').insertAdjacentHTML('beforeend', html);
                const catId = p.category?.toLowerCase().replace(/[^a-z]/g, '');
                if(document.getElementById(`container-${catId}`)) document.getElementById(`container-${catId}`).insertAdjacentHTML('beforeend', html);
            });
        }

        async function addProduct(e) {
            e.preventDefault();
            const tkn = localStorage.getItem('he_token');
            const body = {
                name: document.getElementById('addName').value,
                price: parseFloat(document.getElementById('addPrice').value),
                category: document.getElementById('addCategory').value,
                quantity: parseInt(document.getElementById('addQty').value),
                pharmacyId: parseInt(currentPharmacyId)
            };
            const res = await fetch('http://localhost:4000/api/products', {
                method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer '+tkn},
                body: JSON.stringify(body)
            });
            if(res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('addItemModal')).hide();
                document.getElementById('addItemForm').reset();
                document.getElementById('addQty').value = 0;
                await refreshData();
                alert('Nieuw item toegevoegd.');
            } else {
                const data = await res.json().catch(() => ({}));
                alert(data.error || 'Toevoegen mislukt.');
            }
        }

        async function saveStock(productId) {
            const qty = document.getElementById(`qty-${productId}`).value;
            const tkn = localStorage.getItem('he_token');
            await fetch(`http://localhost:4000/api/pharmacies/${currentPharmacyId}/stock`, {
                method: 'PATCH', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer '+tkn},
                body: JSON.stringify({ productId: parseInt(productId), quantity: parseInt(qty) })
            });
            alert('Opgeslagen!');
        }

        async function deleteProduct(id) {
            if(!confirm('Verwijderen?')) return;
            const tkn = localStorage.getItem('he_token');
            const res = await fetch(`http://localhost:4000/api/products/${id}`, {
                method: 'DELETE', headers: {'Authorization': 'Bearer '+tkn}
            });
            if (res.ok) {
                await refreshData();
                alert('Item verwijderd.');
            } else {
                const data = await res.json().catch(() => ({}));
                alert(data.error || 'Verwijderen mislukt.');
            }
        }

        async function loadOrders() {
            const tkn = localStorage.getItem('he_token');
            const res = await fetch(`http://localhost:4000/api/pharmacies/${currentPharmacyId}/orders`, { headers: {'Authorization': 'Bearer '+tkn}});
            allOrders = await res.json();
            renderOrders();
        }

        function getActionButtons(order) {
            const buttons = [];
            if (order.deliveryMethod === 'Delivery') {
                buttons.push(`<button class="btn btn-sm btn-outline-dark rounded-pill px-3" onclick="updateStatus(${order.id}, 'READY_FOR_DELIVERY')">Ready for Delivery</button>`);
                buttons.push(`<button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="updateStatus(${order.id}, 'ON_ITS_WAY')">On Its Way</button>`);
            } else {
                buttons.push(`<button class="btn btn-sm btn-outline-dark rounded-pill px-3" onclick="updateStatus(${order.id}, 'READY_FOR_PICKUP')">Ready for Pickup</button>`);
            }
            buttons.push(`<button class="btn btn-sm btn-outline-success rounded-pill px-3" onclick="updateStatus(${order.id}, 'DELIVERED')">Delivered</button>`);
            if (order.status !== 'CANCELLED' && order.status !== 'DELIVERED') {
                buttons.push(`<button type="button" class="btn btn-sm btn-outline-danger rounded-pill px-3 cancel-order-btn" data-order-id="${order.id}">Cancel</button>`);
            }
            return buttons.join('');
        }

        function renderOrders() {
            const container = document.getElementById('ordersManage');
            const orders = currentOrderFilter === 'ALL'
                ? allOrders
                : allOrders.filter(order => order.status === currentOrderFilter);

            if (!orders.length) {
                container.innerHTML = '<p class="small text-muted mb-0">Geen orders gevonden voor deze filter.</p>';
                return;
            }

            container.innerHTML = orders.map(o => {
                const deliveryBtn = o.deliveryMethod === 'Delivery' 
                    ? `<button class="btn btn-sm btn-warning text-dark rounded-pill px-3" onclick='viewDeliveryDetails(${JSON.stringify(o)})'>
                        <i class="bi bi-geo-alt me-1"></i> Details
                       </button>` 
                    : '';
                const detailsId = `order-details-${o.id}`;
                const statusClass = `status-${String(o.status || '').toLowerCase().replace(/_/g, '-')}`;

                return `
                <div class="order-card shadow-sm">
                    <div class="d-flex justify-content-between"><strong>${o.customerName}</strong><span class="status-badge ${statusClass}">${formatStatusLabel(o.status)}</span></div>
                    <div class="small text-muted mb-2">Order #${o.id} (${o.deliveryMethod})</div>
                    <button type="button" class="order-toggle" data-target="${detailsId}" aria-expanded="false">
                        <span>Bekijk details</span>
                        <i class="bi bi-chevron-down"></i>
                    </button>
                    <div id="${detailsId}" hidden>
                        ${renderOrderDetails(o)}
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-sm btn-info text-white rounded-pill px-3" onclick='viewDocs(${JSON.stringify(o)})'>
                            <i class="bi bi-eye me-1"></i> Docs
                        </button>
                        ${deliveryBtn}
                        ${getActionButtons(o)}
                    </div>
                </div>
            `}).join('');
            attachOrderToggles();
            attachCancelButtons();
        }

        function viewDocs(order) {
            const baseUrl = 'http://localhost:4000/'; 
            const presBox = document.getElementById('prescriptionView');
            const idBox = document.getElementById('idCardView');

            const getHtml = (path) => {
                if(!path) return '<span class="text-danger small">Geen bestand</span>';
                const url = baseUrl + path;
                return path.toLowerCase().endsWith('.pdf') 
                    ? `<a href="${url}" target="_blank" class="btn btn-sm btn-primary">Open PDF</a>`
                    : `<img src="${url}" alt="Document">`;
            };

            presBox.innerHTML = getHtml(order.prescriptionPath);
            idBox.innerHTML = getHtml(order.idCardPath);

            new bootstrap.Modal(document.getElementById('viewDocsModal')).show();
        }

        function viewDeliveryDetails(order) {
            const body = document.getElementById('deliveryModalBody');
            body.innerHTML = `
                <div class="mb-3">
                    <label class="small fw-bold text-muted d-block">KLANT NAAM</label>
                    <p class="mb-0">${order.customerName}</p>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold text-muted d-block">BEZORGADRES</label>
                    <p class="mb-0">${order.location || 'Niet opgegeven'}</p>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="small fw-bold text-muted d-block">TELEFOON</label>
                        <p class="mb-0">${order.phone}</p>
                    </div>
                    <div class="col-6">
                        <label class="small fw-bold text-muted d-block">AFSTAND</label>
                        <p class="mb-0">${order.distanceKm ? order.distanceKm.toFixed(2) + ' km' : 'N/A'}</p>
                    </div>
                </div>
                <div class="mt-4">
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(order.location)}" target="_blank" class="btn btn-primary w-100 rounded-pill">
                        <i class="bi bi-map me-2"></i> Open in Google Maps
                    </a>
                </div>
            `;
            new bootstrap.Modal(document.getElementById('deliveryDetailsModal')).show();
        }

        async function updateStatus(id, status) {
            const tkn = localStorage.getItem('he_token');
            const res = await fetch(`http://localhost:4000/api/orders/${id}/status`, {
                method: 'PATCH', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer '+tkn},
                body: JSON.stringify({ status })
            });
            if (res.ok) {
                await loadOrders();
            } else {
                const data = await res.json().catch(() => ({}));
                alert(data.error || 'Status update mislukt.');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
