<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - Testimonials</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background-color: #f4f7f7;
      }

      /* Hoofdsectie met zachte achtergrond */
      .he-section {
        background: linear-gradient(135deg, #c1e3df 0%, #d5efec 100%);
        margin: 2rem 1rem;
        border-radius: 30px;
        padding: 4rem 2rem;
        box-shadow: 0 10px 30px rgba(12, 59, 93, 0.05);
      }

      /* TESTIMONIAL CARD DESIGN */
      .he-card {
        background-color: #ffffff;
        border-radius: 24px;
        padding: 2rem;
        min-height: 250px;
        border: 1px solid rgba(12, 59, 93, 0.05);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      /* De "beweging" bij hover */
      .he-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 20px 40px rgba(12, 59, 93, 0.12);
        border-color: #0c3b5d;
      }

      /* Quote icoon styling */
      .quote-icon {
        font-size: 2rem;
        color: #0c3b5d;
        opacity: 0.2;
        margin-bottom: -1rem;
      }

      /* Sterren styling */
      .rating-stars {
        color: #ffc107;
        font-size: 0.9rem;
        letter-spacing: 2px;
      }

      .testimonial-text {
        font-style: italic;
        color: #4a5a5a;
        line-height: 1.6;
        font-size: 1rem;
      }

      .author-name {
        color: #0c3b5d;
        font-weight: 700;
        font-size: 0.95rem;
      }

      /* Custom scrollbar voor de horizontale rij op mobile */
      #reviewRow::-webkit-scrollbar {
        height: 6px;
      }
      #reviewRow::-webkit-scrollbar-track {
        background: transparent;
      }
      #reviewRow::-webkit-scrollbar-thumb {
        background: #0c3b5d;
        border-radius: 10px;
      }

      /* MODERN FOOTER STYLING */
.he-footer {
  background-color: #c1e3df;
  padding: 4rem 1.5rem 2rem;
  margin-top: 5rem;
  color: #0c3b5d;
  border-top: 1px solid rgba(12, 59, 93, 0.1);
}

.footer-brand {
  font-weight: 800;
  font-size: 1.5rem;
  margin-bottom: 1.2rem;
  display: flex;
  align-items: center;
  gap: 12px;
}

.footer-links h6 {
  font-weight: 800;
  margin-bottom: 1.5rem;
  text-transform: uppercase;
  font-size: 0.85rem;
  letter-spacing: 1.2px;
  color: #0c3b5d;
}

.footer-links ul {
  list-style: none;
  padding: 0;
}

.footer-links ul li {
  margin-bottom: 0.9rem;
}

.footer-links ul li a {
  color: #4a5a5a;
  text-decoration: none;
  transition: all 0.2s ease;
  display: inline-block;
}

.footer-links ul li a:hover {
  color: #0077c2;
  padding-left: 5px;
}

.social-icons a {
  font-size: 1.6rem;
  color: #0c3b5d;
  margin-right: 1.2rem;
  transition: all 0.3s ease;
  display: inline-block;
}

.social-icons a:hover {
  transform: translateY(-4px) rotate(8deg);
  color: #0077c2;
}

.footer-bottom {
  border-top: 1px solid rgba(12, 59, 93, 0.1);
  padding-top: 2rem;
  margin-top: 3.5rem;
  color: #6c7a7a;
}

/* Zorg dat iconen in de contactlijst de juiste kleur hebben */
.footer-links .bi {
  color: #0077c2;
}

@media (max-width: 767.98px) {
  .he-footer {
    padding-top: 3rem;
    text-align: center;
  }
  
  .footer-brand {
    justify-content: center;
  }
  
  .footer-links {
    margin-bottom: 2rem;
  }
}
    </style>
  </head>
  <body>

    <div id="navbar-container"></div>

    <main class="container py-4">
      <section class="he-section text-center">
        <div class="mb-5">
          <h2 class="display-5 fw-bold" style="color: #0c3b5d;">What our clients say</h2>
          <p class="lead text-muted mx-auto" style="max-width: 600px;">
            We are proud to help thousands of people daily. Here is what they think of our service.
          </p>
        </div>

        <div id="reviewRow" class="row g-4 flex-nowrap overflow-auto pb-4 px-2">
            </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="shared/load-navbar.js"></script>
    <script src="app.js"></script>

    <script>
      async function loadReviews() {
        try {
          const res = await fetch('http://localhost:4000/api/reviews');
          const reviews = await res.json();
          const row = document.getElementById('reviewRow');
          row.innerHTML = '';

          if (!reviews.length) {
            row.innerHTML = '<p class="text-muted w-100">No testimonials available yet.</p>';
            return;
          }

          reviews.forEach((r) => {
            const col = document.createElement('div');
            // Op mobile pakken ze 85% van de breedte, op desktop zijn ze 4 per rij
            col.className = 'col-10 col-md-3';
            col.innerHTML = `
              <div class="he-card">
                <div>
                  <div class="quote-icon"><i class="bi bi-quote"></i></div>
                  <p class="testimonial-text mb-4">"${r.comment}"</p>
                </div>
                <div>
                  <div class="rating-stars mb-2">
                    ${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}
                  </div>
                  <div class="d-flex align-items-center gap-2">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" 
                         style="width: 35px; height: 35px; background-color: #e7f4f2; color: #0c3b5d;">
                      <i class="bi bi-person-fill"></i>
                    </div>
                    <span class="author-name">${r.author}</span>
                  </div>
                </div>
              </div>
            `;
            row.appendChild(col);
          });
        } catch (err) {
          console.error("Fout bij laden reviews:", err);
          document.getElementById('reviewRow').innerHTML = '<p class="text-danger">Reviews konden niet worden geladen.</p>';
        }
      }

      document.addEventListener('DOMContentLoaded', loadReviews);
    </script>
    <div id="footer-container"></div>
    <script src="shared/load-footer.js"></script>
  </body>
</html>
