<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f4f7f7; color: #0c3b5d; }
        
        .he-page { padding: 2rem 1rem; }
        @media (min-width: 768px) { .he-page { padding: 3rem 5rem; } }
        
        .he-panel { background-color: #e7f4f2; border-radius: 18px; padding: 2.5rem; height: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        .he-title { font-size: 1.75rem; font-weight: 700; color: #0c3b5d; margin-bottom: 2rem; }
        .he-pill-toggle button { border-radius: 999px; padding: 0.5rem 1.5rem; border: 2px solid #0c3b5d; background-color: #ffffff; color: #0c3b5d; font-weight: 600; }
        .he-pill-toggle button.active { background-color: #36b5ff; color: #ffffff; border-color: #36b5ff; }
        .he-place-order { background-color: #36b5ff; color: #ffffff; border-radius: 999px; border: none; padding: 0.8rem; font-weight: 700; width: 100%; transition: 0.3s; margin-top: 1rem; }
        .he-place-order:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.7; }
        .he-summary-footer { background-color: #ffffff; border-radius: 12px; padding: 1rem; margin-top: 1rem; display: flex; justify-content: space-between; font-weight: 700; }
        #map { width: 100%; height: 250px; border-radius: 12px; margin-top: 10px; border: 1px solid #ddd; z-index: 1; }
    </style>
</head>
<body>

    <div id="navbar-container"></div>

    <main class="he-page">
        <div class="container-fluid">
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="he-panel">
                        <h4 class="he-title">Order Summary</h4>
                        <div id="cartItems" class="mb-3"></div>
                        <div id="cartItems" class="mb-3"></div>

                         <div class="text-end mb-3">
                            <button type="button" id="clearCartBtn" class="btn btn-sm btn-outline-danger border-0">
                                <i class="bi bi-trash3 me-1"></i> Clear Cart
                                  </button>
                                </div>

                        <hr>
                        <hr>
                        <div class="small d-grid gap-2">
                            <div class="d-flex justify-content-between"><span>Bag Total</span><span id="bagTotalText">SRD 0.00</span></div>
                            <div class="d-flex justify-content-between"><span>Admin Fee</span><span>SRD 30.00</span></div>
                            <div class="d-flex justify-content-between"><span>Platform Fee</span><span>SRD 50.00</span></div>
                            <div class="d-flex justify-content-between fw-bold" id="deliveryRow" style="display:none;">
                                <span>Delivery Fee</span><span id="deliveryFeeText">SRD 0.00</span>
                            </div>
                        </div>
                        <div class="he-summary-footer">
                            <span>Total Amount</span>
                            <span id="totalAmountText">SRD 0.00</span>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="he-panel">
                        <h4 class="he-title">Checkout Details</h4>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Shipping Information</label>
                            <div class="he-pill-toggle d-flex gap-2">
                                <button type="button" id="pickUpBtn" class="active">Pick up</button>
                                <button type="button" id="deliveryBtn">Delivery</button>
                            </div>
                        </div>

                        <form id="checkoutForm" class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Full Name</label>
                                <input type="text" class="form-control" name="customerName" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Email</label>
                                <input type="email" class="form-control" name="email" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Phone Number</label>
                                <input type="text" class="form-control" name="phone" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Delivery Address</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="location"
                                    id="customerAddress"
                                    placeholder="Not needed for pick up"
                                    disabled
                                />
                            </div>

                            <div class="col-12 mt-4">
                                <label class="form-label fw-bold small">Select Pharmacy</label>
                                <select id="pharmacySelect" class="form-select mb-2" required>
                                    <option value="">Choose a pharmacy...</option>
                                </select>
                                <div id="map"></div>
                                <div class="mt-2 small d-flex justify-content-between align-items-center">
                                    <span>Selected: <span id="selectedPharmacyLabel" class="fw-bold">None</span></span>
                                    <button type="button" id="useMyLocationBtn" class="btn btn-sm btn-outline-primary">Use My Location</button>
                                </div>
                            </div>

                            <div class="col-md-6 mt-3">
                                <label class="form-label fw-bold small">Prescription (Required)</label>
                                <input type="file" name="prescription" id="prescriptionInput" class="form-control" required />
                            </div>
                            <div class="col-md-6 mt-3">
                                <label class="form-label fw-bold small">ID Card (Required)</label>
                                <input type="file" name="idCard" id="idCardInput" class="form-control" required />
                            </div>

                            <div class="col-12 mt-4">
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox" id="termsCheck" required />
                                    <label class="form-check-label small" for="termsCheck">
                                        I agree to the <a href="terms.html" target="_blank" rel="noopener noreferrer">terms and conditions</a>
                                    </label>
                                </div>
                                <button type="submit" id="placeOrderBtn" class="he-place-order" disabled>Place Order</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="shared/load-navbar.js"></script>
    <script src="app.js"></script>

    <script>
        const ADMIN_FEE = 30;
        const PLATFORM_FEE = 50;
        let bagTotal = 0;
        let deliveryFee = 0;
        let finalTotal = 0;
        let deliveryMethod = 'Pick up';
        let selectedPharmacy = null;
        let pharmacies = [];
        let customerLat = null;
        let customerLng = null;
        let distanceKm = null;
        let map, marker;

        function syncDeliveryFields() {
            const addressInput = document.getElementById('customerAddress');
            const mapEl = document.getElementById('map');
            const useMyLocationBtn = document.getElementById('useMyLocationBtn');

            if (deliveryMethod === 'Pick up') {
                addressInput.value = '';
                addressInput.disabled = true;
                addressInput.required = false;
                addressInput.placeholder = 'Not needed for pick up';

                customerLat = null;
                customerLng = null;
                distanceKm = null;
                if (marker) {
                    map.removeLayer(marker);
                    marker = null;
                }

                mapEl.style.opacity = '0.5';
                mapEl.style.pointerEvents = 'none';
                useMyLocationBtn.disabled = true;
            } else {
                addressInput.disabled = false;
                addressInput.required = true;
                addressInput.placeholder = 'Enter your delivery address';

                mapEl.style.opacity = '1';
                mapEl.style.pointerEvents = 'auto';
                useMyLocationBtn.disabled = false;
            }
        }

        function init() {
            loadCart();
            fetchPharmacies();
            initMap();
        }

        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('he_cart') || '[]');
            const container = document.getElementById('cartItems');
            bagTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            container.innerHTML = cart.map(item => `
                <div class="d-flex justify-content-between mb-1 small">
                    <span>${item.name} (x${item.qty})</span>
                    <span>SRD ${(item.price * item.qty).toFixed(2)}</span>
                </div>
            `).join('');
            updateTotals();
        }

        function updateTotals() {
            if (deliveryMethod === 'Delivery' && distanceKm) {
                deliveryFee = Math.max(100, Number((10 * distanceKm).toFixed(2)));
                document.getElementById('deliveryRow').style.display = 'flex';
                document.getElementById('deliveryFeeText').textContent = `SRD ${deliveryFee.toFixed(2)}`;
            } else {
                deliveryFee = 0;
                document.getElementById('deliveryRow').style.display = 'none';
            }

            finalTotal = bagTotal + ADMIN_FEE + PLATFORM_FEE + deliveryFee;
            document.getElementById('bagTotalText').textContent = `SRD ${bagTotal.toFixed(2)}`;
            document.getElementById('totalAmountText').textContent = `SRD ${finalTotal.toFixed(2)}`;
            validate();
        }

        document.getElementById('pickUpBtn').onclick = () => {
            deliveryMethod = 'Pick up';
            document.getElementById('pickUpBtn').classList.add('active');
            document.getElementById('deliveryBtn').classList.remove('active');
            syncDeliveryFields();
            updateTotals();
        };

        document.getElementById('deliveryBtn').onclick = () => {
            deliveryMethod = 'Delivery';
            document.getElementById('deliveryBtn').classList.add('active');
            document.getElementById('pickUpBtn').classList.remove('active');
            syncDeliveryFields();
            updateTotals();
        };

        async function fetchPharmacies() {
            try {
                const res = await fetch('http://localhost:4000/api/pharmacies');
                pharmacies = await res.json();
                const select = document.getElementById('pharmacySelect');
                pharmacies.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    select.appendChild(opt);
                });

                select.onchange = (e) => {
                    selectedPharmacy = pharmacies.find(p => p.id == e.target.value);
                    document.getElementById('selectedPharmacyLabel').textContent = selectedPharmacy ? selectedPharmacy.name : 'None';
                    if (selectedPharmacy && customerLat) calculateDistance();
                    updateTotals();
                };
            } catch (err) { console.error('Pharmacies failed', err); }
        }

        function initMap() {
            map = L.map('map').setView([5.852, -55.203], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            map.on('click', (e) => {
                if (deliveryMethod !== 'Delivery') return;
                updateLocation(e.latlng.lat, e.latlng.lng);
            });

            document.getElementById('useMyLocationBtn').onclick = () => {
                if (deliveryMethod !== 'Delivery') return;
                navigator.geolocation.getCurrentPosition(pos => {
                    updateLocation(pos.coords.latitude, pos.coords.longitude);
                    map.setView([pos.coords.latitude, pos.coords.longitude], 14);
                });
            };
        }

        function updateLocation(lat, lng) {
            customerLat = lat;
            customerLng = lng;
            if (marker) marker.setLatLng([lat, lng]);
            else marker = L.marker([lat, lng]).addTo(map);
            if (selectedPharmacy) calculateDistance();
        }

        function calculateDistance() {
            if (!selectedPharmacy || !customerLat) return;
            const d = Math.sqrt(Math.pow(selectedPharmacy.lat - customerLat, 2) + Math.pow(selectedPharmacy.lng - customerLng, 2));
            distanceKm = d * 111; 
            updateTotals();
        }

        function validate() {
            const btn = document.getElementById('placeOrderBtn');
            const hasFiles = document.getElementById('prescriptionInput').files.length > 0 && 
                             document.getElementById('idCardInput').files.length > 0;
            const hasTerms = document.getElementById('termsCheck').checked;
            const locationOk = (deliveryMethod === 'Pick up') || (deliveryMethod === 'Delivery' && customerLat);
            btn.disabled = !(selectedPharmacy && hasFiles && hasTerms && bagTotal > 0 && locationOk);
        }

        document.getElementById('prescriptionInput').onchange = validate;
        document.getElementById('idCardInput').onchange = validate;
        document.getElementById('termsCheck').onchange = validate;

        document.getElementById('checkoutForm').onsubmit = async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('he_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            const fd = new FormData();
            
            fd.append('prescription', document.getElementById('prescriptionInput').files[0]);
            fd.append('idCard', document.getElementById('idCardInput').files[0]);

            const form = e.target;
            fd.append('customerName', form.customerName.value);
            fd.append('email', form.email.value);
            fd.append('phone', form.phone.value);
            fd.append('location', deliveryMethod === 'Delivery' ? form.location.value : '');
            fd.append('deliveryMethod', deliveryMethod);
            fd.append('bagTotal', Number(bagTotal));
            fd.append('pharmacyId', Number(selectedPharmacy.id));
            fd.append('items', localStorage.getItem('he_cart') || '[]');

            if (customerLat) fd.append('customerLat', Number(customerLat));
            if (customerLng) fd.append('customerLng', Number(customerLng));
            if (distanceKm) fd.append('distanceKm', Number(distanceKm));

            try {
                const res = await fetch('http://localhost:4000/api/orders', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: fd
                });

                if (res.ok) {
                    alert('Order succes!');
                    localStorage.removeItem('he_cart');
                    window.location.href = 'account.html';
                } else {
                    const data = await res.json();
                    alert('Fout: ' + data.error);
                }
            } catch (err) { alert('Serverfout'); }
        };

        window.onload = init;

        syncDeliveryFields();

      document.getElementById('clearCartBtn').onclick = () => {
    if (confirm('Weet je zeker dat je de winkelwagen wilt legen?')) {
        // 1. Verwijder de cart uit localStorage
        localStorage.removeItem('he_cart');
        
        // 2. Herlaad de cart weergave op deze pagina
        loadCart();
        
        // 3. Update de badge in de navbar (functie uit app.js)
        if (typeof updateCartBadge === 'function') {
            updateCartBadge();
        }
    }
};
    </script>
</body>
</html>
