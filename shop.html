<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - Shop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background-color: #f4f7f7;
        color: #0c3b5d;
      }

      /* Sectie titels */
      .he-section-title {
        text-align: center;
        margin-top: 2.5rem;
        margin-bottom: 0.5rem;
        color: #0c3b5d;
        font-weight: 800;
        font-size: 2.5rem;
      }

      .he-section-subtitle {
        text-align: center;
        color: #6c7a7a;
        margin-bottom: 2.5rem;
        font-size: 1.1rem;
      }

      /* PRODUCT CARD STYLING & ANIMATIE */
      .he-product-card {
        background-color: #ffffff;
        border-radius: 22px;
        padding: 1.5rem;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(12, 59, 93, 0.05);
      }

      .he-product-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 35px rgba(12, 59, 93, 0.12);
        border-color: #c1e3df;
      }

      .he-product-card img {
        max-width: 100%;
        height: 140px;
        object-fit: contain;
        border-radius: 15px;
        margin-bottom: 1rem;
      }

      /* CATEGORY CARD STYLING & ANIMATIE */
      .category-card {
        background: transparent;
        padding: 0.5rem;
        transition: transform 0.3s ease;
      }

      .category-card:hover {
        transform: scale(1.05);
      }

      .category-box {
        background-color: #e7f4f2;
        border-radius: 20px;
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0.8rem;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      }

      .category-box img {
        max-height: 130px;
        width: auto;
        object-fit: contain;
        transition: transform 0.5s ease;
      }

      .category-card:hover .category-box img {
        transform: scale(1.15);
      }

      /* MODERNE FOOTER STYLING */
      .he-footer {
        background-color: #c1e3df;
        padding: 4rem 1.5rem 2rem;
        margin-top: 5rem;
        color: #0c3b5d;
        border-top: 1px solid rgba(12, 59, 93, 0.1);
      }

      .footer-brand {
        font-weight: 800;
        font-size: 1.5rem;
        margin-bottom: 1.2rem;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .footer-links h6 {
        font-weight: 800;
        margin-bottom: 1.5rem;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1.2px;
      }

      .footer-links ul {
        list-style: none;
        padding: 0;
      }

      .footer-links ul li {
        margin-bottom: 0.9rem;
      }

      .footer-links ul li a {
        color: #4a5a5a;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .footer-links ul li a:hover {
        color: #0077c2;
        padding-left: 5px;
      }

      .social-icons a {
        font-size: 1.6rem;
        color: #0c3b5d;
        margin-right: 1.2rem;
        transition: all 0.3s ease;
        display: inline-block;
      }

      .social-icons a:hover {
        transform: translateY(-4px) rotate(8deg);
        color: #0077c2;
      }

      .footer-bottom {
        border-top: 1px solid rgba(12, 59, 93, 0.1);
        padding-top: 2rem;
        margin-top: 3.5rem;
      }
    </style>
  </head>
  <body>

    <div id="navbar-container"></div>

    <main class="container py-4">
      <h2 class="he-section-title">Shop by Category</h2>
      <p class="he-section-subtitle">
        Vind precies wat je nodig hebt in ons uitgebreide assortiment.
      </p>

      <div id="categoriesGrid" class="row g-4 mb-4"></div>

      <div id="categoryViewHeader" class="d-flex justify-content-between align-items-center mb-5" style="display:none">
        <div id="categoryViewLeft"></div>
        <div>
          <h2 id="categoryViewTitle" class="mb-0 fw-bold" style="color:#0c3b5d;"></h2>
        </div>
        <div style="width: 80px;"></div> 
      </div>

      <div id="productGrid" class="row g-4"></div>
    </main>

    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" style="border-radius: 25px; border: none; overflow: hidden;">
          <div class="modal-header border-0 pb-0">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4 p-md-5">
            <div class="row align-items-center">
              <div class="col-md-5 mb-4 mb-md-0" id="modalImageWrap"></div>
              <div class="col-md-7">
                <span id="modalProductCategory" class="badge bg-light text-primary mb-2 px-3 py-2 rounded-pill"></span>
                <h3 id="modalProductName" class="fw-bold mb-3" style="color: #0c3b5d;"></h3>
                <p id="modalProductDescription" class="text-muted mb-4" style="line-height: 1.6;"></p>
                <div class="d-flex align-items-center justify-content-between">
                  <div class="fs-2 fw-bold text-primary" id="modalProductPrice"></div>
                  <button type="button" class="btn btn-primary rounded-pill px-5 py-2 fw-bold" id="modalAddToCart">Add to cart</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="shared/load-navbar.js"></script>
    <script src="app.js"></script>

    <script>
      const categories = [
        // Must match homepage category links
        { name: 'Personal care', image: 'images/personal_care.png' },
        { name: 'Diabetic Care', image: 'images/diabetic_care.png' },
        { name: 'Supplements', image: 'images/supplements.png' },
        { name: 'Devices', image: 'images/medical_devices.png' },
        { name: 'Vitamins', image: 'images/immune_support.png' },
        { name: 'First Aid', image: 'images/first_aid_basics.png' },
        { name: 'Allergy', image: 'images/allergy.png' },
        { name: 'Immune Support', image: 'images/immune_support.png' },
        { name: 'Pain & Fever Relief', image: 'images/pain_and_fever_relief.png' }
      ];

      let allProducts = [];
      let lastModalProduct = null;

      function normalize(str) {
        return String(str || '')
          .trim()
          .toLowerCase()
          .replace(/\s+/g, ' ');
      }

      function renderCategories() {
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = '';
        
        const allCol = document.createElement('div');
        allCol.className = 'col-6 col-md-3';
        allCol.innerHTML = `
          <div class="category-card" style="cursor:pointer;">
            <div class="category-box"><img src='images/shop_all_cat.png' alt='All' /></div>
            <div class="text-center fw-bold">All categories</div>
          </div>`;
        allCol.addEventListener('click', () => showProductsFor('All categories', allProducts));
        grid.appendChild(allCol);

        categories.forEach((c) => {
          const col = document.createElement('div');
          col.className = 'col-6 col-md-3';
          col.innerHTML = `
            <div class="category-card" style="cursor:pointer;">
              <div class="category-box"><img src='${c.image}' alt='${c.name}' /></div>
              <div class="text-center fw-bold">${c.name}</div>
            </div>`;
          col.addEventListener('click', () => {
            const filtered = allProducts.filter((p) => normalize(p.category) === normalize(c.name));
            showProductsFor(c.name, filtered);
          });
          grid.appendChild(col);
        });
      }

      function showProductsFor(name, list) {
        document.getElementById('categoriesGrid').style.display = 'none';
        document.getElementById('categoryViewHeader').style.display = 'flex';
        document.getElementById('categoryViewTitle').textContent = name;
        
        const left = document.getElementById('categoryViewLeft');
        left.innerHTML = '<button class="btn btn-outline-dark rounded-pill px-4 fw-bold" onclick="showCategories()"><i class="bi bi-arrow-left me-2"></i> Terug</button>';
        
        renderProducts(list);
      }

      function showCategories() {
        document.getElementById('categoriesGrid').style.display = '';
        document.getElementById('categoryViewHeader').style.display = 'none';
        document.getElementById('productGrid').innerHTML = '';
      }

      async function loadProducts() {
        try {
          const res = await fetch('http://localhost:4000/api/products');
          allProducts = await res.json();
          renderCategories();
          applyInitialFilterFromUrl();
        } catch (err) { console.error('Error loading products', err); }
      }

      function applyInitialFilterFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const category = params.get('category');
        const search = params.get('search');

        if (category) {
          const filtered = allProducts.filter((p) => normalize(p.category) === normalize(category));
          showProductsFor(category, filtered);
          return;
        }

        if (search) {
          const q = normalize(search);
          const filtered = allProducts.filter((p) => {
            const hay = normalize(`${p.name} ${p.category} ${p.subCategory} ${p.description}`);
            return hay.includes(q);
          });
          showProductsFor(`Search: ${search}`, filtered);
        }
      }

      function renderProducts(list) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        if (!list.length) {
          grid.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted fs-5">Geen producten gevonden in deze categorie.</p></div>';
          return;
        }

        list.forEach((product) => {
          const col = document.createElement('div');
          col.className = 'col-12 col-md-4 mb-4'; 
          col.innerHTML = `
            <div class="he-product-card h-100 d-flex flex-column">
              <img src="${product.imageUrl || 'https://via.placeholder.com/200'}" alt="${product.name}" />
              <div class="fw-bold mt-2 mb-1 fs-5">${product.name}</div>
              <div class="small text-muted mb-3">${product.category || 'Overig'}</div>
              <div class="fw-bold text-primary fs-4 mb-3">SRD ${Number(product.price).toFixed(2)}</div>
              <div class="mt-auto d-grid gap-2">
                <button class="btn btn-primary rounded-pill py-2 add-to-cart-btn fw-bold">Add to cart</button>
                <button class="btn btn-link text-decoration-none more-info-btn fw-semibold" style="color:#0c3b5d;">Bekijk details</button>
              </div>
            </div>
          `;
          grid.appendChild(col);
          col.querySelector('.add-to-cart-btn').addEventListener('click', () => addToCart(product));
          col.querySelector('.more-info-btn').addEventListener('click', () => openProductModal(product));
        });
      }

      function openProductModal(product) {
        lastModalProduct = product;
        document.getElementById('modalProductName').textContent = product.name;
        document.getElementById('modalProductCategory').textContent = product.category;
        document.getElementById('modalProductDescription').textContent = product.description || 'Geen beschrijving beschikbaar.';
        document.getElementById('modalProductPrice').textContent = 'SRD ' + Number(product.price).toFixed(2);
        const safeImg = product.imageUrl || 'images/shop_all_cat.png';
        document.getElementById('modalImageWrap').innerHTML = `<img src="${safeImg}" alt="${product.name}" class="img-fluid rounded-4 shadow-sm" />`;
        new bootstrap.Modal(document.getElementById('productModal')).show();
      }

      document.getElementById('modalAddToCart').addEventListener('click', () => {
        if (lastModalProduct) addToCart(lastModalProduct);
      });

      window.onload = loadProducts;
    </script>
    <div id="footer-container"></div>
    <script src="shared/load-footer.js"></script>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="cartToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span id="toastMessage">Product toegevoegd aan winkelwagen!</span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

  </body>
</html>
