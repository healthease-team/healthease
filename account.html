<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - My Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background:#f4f7f7; color: #0c3b5d; }
        .he-header { background: #c1e3df; padding:1rem 1.5rem; }
        .he-logo { color: #0c3b5d; font-weight:700; }
        .he-panel { background: #e7f4f2; border-radius: 20px; padding: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; border: none; }
        
        /* Order Status Kleuren */
        .status-badge { padding: 0.4rem 0.8rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #cce5ff; color: #004085; }
        .status-ready { background: #d4edda; color: #155724; }
        .status-delivered { background: #d1ecf1; color: #0c5460; }
        .status-cancelled { background: #f8d7da; color: #721c24; }

        .order-row { background: white; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid rgba(0,0,0,0.05); transition: transform 0.2s; }
        .order-row:hover { transform: translateY(-2px); }
        .star-rating { color: #ffc107; cursor: pointer; font-size: 1.5rem; }
        .btn-primary-he { background: #0c3b5d; color: white; border-radius: 999px; border: none; padding: 0.6rem 1.2rem; }
    </style>
</head>
<body>
    <header class="he-header mb-4">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="index.html" class="text-decoration-none d-flex align-items-center gap-2">
                <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; background-color: #0c3b5d;">
                    <span class="text-white fw-bold">H</span>
                </div>
                <span class="he-logo">HealthEase</span>
            </a>
            <div id="userGreeting" class="fw-bold text-dark"></div>
        </div>
    </header>

    <main class="container">
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="he-panel h-100">
                    <h4 class="mb-4 fw-bold"><i class="bi bi-bag-check me-2"></i>Mijn Bestellingen</h4>
                    <div id="ordersList">
                        <div class="text-center py-4 text-muted">Bestellingen worden geladen...</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="he-panel">
                    <h4 class="mb-3 fw-bold"><i class="bi bi-star me-2"></i>Deel je ervaring</h4>
                    <p class="small text-muted mb-4">Plaats een testimonial en help anderen met hun keuze.</p>
                    <form id="testimonialForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Jouw Score</label>
                            <div class="star-rating mb-2" id="starContainer">
                                <i class="bi bi-star-fill" data-value="1"></i>
                                <i class="bi bi-star-fill" data-value="2"></i>
                                <i class="bi bi-star-fill" data-value="3"></i>
                                <i class="bi bi-star-fill" data-value="4"></i>
                                <i class="bi bi-star-fill" data-value="5"></i>
                            </div>
                            <input type="hidden" id="ratingValue" value="5">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Jouw Bericht</label>
                            <textarea class="form-control" id="testimonialComment" rows="4" placeholder="Schrijf hier je ervaring..." required style="border-radius:12px; border:none;"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary-he w-100">Testimonial Plaatsen</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem('he_user') || '{}');
        
        // Welkomstbericht bovenin
        if (user.name) {
            document.getElementById('userGreeting').innerHTML = `<i class="bi bi-person-circle me-1"></i> ${user.name}`;
        }

        // Sterren rating systeem
        const stars = document.querySelectorAll('#starContainer i');
        stars.forEach(s => {
            s.addEventListener('click', () => {
                const val = s.getAttribute('data-value');
                document.getElementById('ratingValue').value = val;
                stars.forEach(star => {
                    const starVal = star.getAttribute('data-value');
                    star.classList.toggle('bi-star-fill', starVal <= val);
                    star.classList.toggle('bi-star', starVal > val);
                });
            });
        });

        // Orders laden met kleurcodes
        async function fetchOrders() {
            const list = document.getElementById('ordersList');
            try {
                const tkn = localStorage.getItem('he_token');
                if (!user || !user.id || !tkn) {
                    window.location.href = 'login.html';
                    return;
                }
                const res = await fetch(`http://localhost:4000/api/users/${user.id}/orders`, {
                    headers: { 'Authorization': 'Bearer ' + tkn }
                });
                const orders = await res.json();
                
                if (orders.length === 0) {
                    list.innerHTML = '<p class="text-muted">Geen bestellingen gevonden.</p>';
                    return;
                }

                list.innerHTML = orders.map(o => {
                    const status = (o.status || 'PENDING').toUpperCase();
                    const statusClass = `status-${status.toLowerCase()}`;
                    return `
                        <div class="order-row">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="fw-bold">Order #${o.id}</div>
                                    <div class="small text-muted">${new Date(o.createdAt).toLocaleDateString()}</div>
                                </div>
                                <span class="status-badge ${statusClass}">${status}</span>
                            </div>
                            <div class="mt-3 fw-bold text-primary">SRD ${Number(o.totalAmount).toFixed(2)}</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                list.innerHTML = '<p class="text-danger">Fout bij laden van orders.</p>';
            }
        }

        // Testimonial POST functie
        document.getElementById('testimonialForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                author: user.name || user.email,
                rating: parseInt(document.getElementById('ratingValue').value),
                comment: document.getElementById('testimonialComment').value
            };

            try {
                const res = await fetch('http://localhost:4000/api/reviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    alert('Bedankt! Je testimonial is direct geplaatst.');
                    window.location.href = 'testimonials.html';
                }
            } catch (err) {
                alert('Er is een fout opgetreden.');
            }
        });

        fetchOrders();
    </script>
</body>
</html>
