<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<!-- Header / Navbar -->
<header class="he-header">
  <div class="container-fluid">
    <div class="d-flex align-items-center justify-content-between gap-3">
      <a href="index.html" class="text-decoration-none">
        <div class="d-flex align-items-center gap-2">
          <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; background-color: #0c3b5d;">
            <span class="text-white fw-bold">H</span>
          </div>
          <span class="he-logo">HealthEase</span>
        </div>
      </a>

      <div class="flex-grow-1 mx-3 d-none d-md-block">
        <div class="he-search-wrapper">
          <span class="bi bi-search"></span>
          <input type="text" id="navbar-search" class="form-control he-search" placeholder="Search for medicines...">
        </div>
      </div>

      <div class="d-flex align-items-center gap-3 right-nav">
        <button class="he-icon-btn position-relative" type="button" id="cart-preview-btn" data-bs-toggle="dropdown" aria-expanded="false">
          <span class="bi bi-cart"></span>
          <span id="cartCountBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"></span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" id="cart-dropdown" style="min-width: 300px; max-height: 400px; overflow-y: auto;">
          <!-- Cart preview items here -->
          <li><span class="dropdown-item text-center py-2">Cart empty</span></li>
        </ul>
        <button class="btn btn-outline-dark rounded-circle border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#mainMenu" aria-controls="mainMenu">
          <span class="bi bi-list" style="font-size: 1.5rem;"></span>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Offcanvas Sidebar -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="mainMenu" aria-labelledby="mainMenuLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="mainMenuLabel">Menu</h5>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column gap-2">
    <a href="index.html" class="btn btn-link text-start nav-link">Home</a>
    <a href="checkout.html" class="btn btn-link text-start nav-link">Cart / Checkout</a>
    <a href="shop.html" class="btn btn-link text-start nav-link">Shop</a>
    <a href="essentials.html" class="btn btn-link text-start nav-link">Everyday Essentials</a>
    <a href="testimonials.html" class="btn btn-link text-start nav-link">Testimonials</a>
    <a href="faq.html" class="btn btn-link text-start nav-link">FAQ</a>
    <a href="contact.html" class="btn btn-link text-start nav-link">Contact Us</a>
    <a href="login.html" class="btn btn-link text-start nav-link">Login / Signup</a>
    <a href="account.html" class="btn btn-link text-start nav-link">My Account</a>
  </div>
</div>

</body>
</html>
