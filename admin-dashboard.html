<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background-color: #f4f7f7;
      }

      .he-header {
        background-color: #c1e3df;
        padding: 1rem 1.5rem;
      }

      .he-logo {
        font-weight: 700;
        color: #0c3b5d;
      }
    </style>
  </head>
  <body>
    <header class="he-header">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
          <span class="he-logo">HealthEase Admin</span>
        </div>
        <button class="btn btn-sm btn-outline-dark" onclick="logout()">Logout</button>
      </div>
    </header>

    <main class="container py-4">
      <h2 class="mb-3" style="color:#0c3b5d;">Admin Dashboard</h2>
      <p class="text-muted">
        Overview of all orders and pharmacies in the HealthEase platform.
      </p>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
              <h5 class="mb-0">All Orders</h5>
            </div>
            <div class="card-body">
              <div class="table-responsive" style="max-height:360px;">
                <table class="table table-sm" id="ordersTable">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Customer</th>
                      <th>Pharmacy</th>
                      <th>Total (SRD)</th>
                      <th>Delivery km</th>
                      <th>Created</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="card border-0 shadow-sm mb-3">
            <div class="card-header bg-white">
              <h5 class="mb-0">Pharmacies</h5>
            </div>
            <div class="card-body">
              <ul class="list-group small" id="pharmaciesList"></ul>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function requireAdmin() {
        const raw = localStorage.getItem('he_user');
        if (!raw) {
          window.location.href = 'login.html';
          return null;
        }
        const user = JSON.parse(raw);
        if (user.role !== 'ADMIN') {
          window.location.href = 'index.html';
          return null;
        }
        return user;
      }

      function logout() {
        localStorage.removeItem('he_user');
        window.location.href = 'index.html';
      }

      async function loadOrders() {
        const res = await fetch('http://localhost:4000/api/orders');
        const orders = await res.json();
        const tbody = document.querySelector('#ordersTable tbody');
        tbody.innerHTML = '';
        orders.forEach((o) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${o.id}</td>
            <td>${o.customerName}</td>
            <td>${o.pharmacy ? o.pharmacy.name : '-'}</td>
            <td>${Number(o.totalAmount).toFixed(2)}</td>
            <td>${o.distanceKm != null ? o.distanceKm.toFixed(1) : '-'}</td>
            <td>${new Date(o.createdAt).toLocaleString()}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      async function loadPharmacies() {
        const res = await fetch('http://localhost:4000/api/pharmacies');
        const pharmacies = await res.json();
        const list = document.getElementById('pharmaciesList');
        list.innerHTML = '';
        pharmacies.forEach((p) => {
          const li = document.createElement('li');
          li.className = 'list-group-item d-flex justify-content-between align-items-center';
          li.innerHTML = `
            <span>${p.name}</span>
            <span class="small text-muted">${p.address}</span>
          `;
          list.appendChild(li);
        });
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const user = requireAdmin();
        if (!user) return;
        await loadOrders();
        await loadPharmacies();
      });
    </script>
  </body>
  </html>
