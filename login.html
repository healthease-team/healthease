<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - Login / Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
          background-color: #c1e3df;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
      }

      /* Flexible auth card that adapts to viewport sizes */
      .auth-card {
        background-color: #c1e3df;
        border-radius: 14px;
        padding: 3.5rem 2.5rem;
        margin: 0 auto;
        width: 100%;
        max-width: 850px;
        box-sizing: border-box;
        /* allow card to fit in viewport and scroll internally when needed */
        max-height: calc(100vh - 48px);
        overflow: auto;
      }

      .auth-panel {
        background-color: #e7f4f2;
        border-radius: 12px;
        padding: 3rem;
        width: 100%;
        box-shadow: 0 8px 28px rgba(0,0,0,0.08);
      }

      /* Responsive adjustments */
      @media (max-width: 1200px) {
        .auth-card { max-width: 900px; padding: 3rem 2rem; }
        .auth-panel { padding: 2.25rem; }
      }

      @media (max-width: 768px) {
        /* On small screens don't try to fully center vertically (avoid cut-off), allow top spacing */
        body { align-items: flex-start; padding: 18px; }
        .auth-card { max-width: 520px; padding: 1.25rem; max-height: none; }
        .auth-panel { padding: 1rem; }
        .form-control.form-control-lg { padding: 0.5rem 0.75rem; font-size: 1rem; }
        .btn-lg { padding: 0.6rem 1rem; font-size: 1rem; }
      }

      @media (max-width: 420px) {
        .auth-card { padding: 1rem; }
        .auth-panel { padding: 0.75rem; }
      }

      .brand {
        font-weight: 700;
        color: #0c3b5d;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <span class="brand">HealthEase</span>
        <a href="index.html" class="text-decoration-none">← Back to Home</a>
      </div>
      <div class="row g-3">
        <div class="col-12">
          <div class="auth-panel" id="authPanel">
            <!-- Login view (visible by default) -->
            <div id="loginView">
              <h3 class="mb-3" style="color: #0c3b5d;">Log In</h3>
              <form id="loginForm" class="mb-3">
                <div class="mb-3">
                  <input
                    type="email"
                    class="form-control form-control-lg"
                    name="email"
                    placeholder="Your email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    name="password"
                    placeholder="Password"
                    required
                  />
                </div>
                <button class="btn btn-lg w-100" style="background:#0c3b5d;color:#fff;">
                  Log in
                </button>
              </form>
              <p class="small text-center mb-1">
                <a href="#" class="text-decoration-none">Forgot password?</a>
              </p>
              <p class="small text-center">
                Don't have an account?
                <a href="#" id="showRegister" class="text-decoration-none"> Sign Up</a>
              </p>
            </div>

            <!-- Register view (hidden initially) -->
            <div id="registerView" style="display:none">
              <h3 class="mb-3" style="color: #0c3b5d;">Create Account</h3>
              <form id="registerForm">
                <div class="mb-3">
                  <input
                    type="email"
                    class="form-control form-control-lg"
                    name="email"
                    placeholder="Your email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    name="password"
                    placeholder="Password"
                    required
                  />
                </div>
                <div class="mb-3">
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    name="passwordRepeat"
                    placeholder="Repeat Password"
                    required
                  />
                </div>
                <button class="btn btn-lg w-100" style="background:#0c3b5d;color:#fff;">
                  Sign up
                </button>
              </form>
              <p class="small text-center mt-3">
                Already have an account?
                <a href="#" id="showLogin" class="text-decoration-none"> Log in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
  document
    .getElementById('loginForm')
    .addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const payload = {
        email: form.email.value,
        password: form.password.value
      };
      try {
        const res = await fetch('http://localhost:4000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Login failed');
        }
        const data = await res.json();
        
        if (data.token) {
          localStorage.setItem('he_token', data.token);
          sessionStorage.setItem('justLoggedIn', '1');
        }

        // Sla de user informatie op, inclusief een 'display name'
        const user = { 
          id: data.id, 
          email: data.email, 
          role: data.role,
          name: data.name || data.email.split('@')[0] // Gebruikt naam of deel van email
        };
        localStorage.setItem('he_user', JSON.stringify(user));

        if (user.role === 'PHARMACY') {
          window.location.href = 'pharmacy-dashboard.html';
        } else if (user.role === 'ADMIN') {
          window.location.href = 'admin-dashboard.html';
        } else {
          window.location.href = 'account.html';
        }
      } catch (err) {
        alert(err.message);
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const password = form.password.value;
      const passwordRepeat = form.passwordRepeat.value;
      if (password !== passwordRepeat) {
        alert('Passwords do not match.');
        return;
      }
      try {
        const res = await fetch('http://localhost:4000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: form.email.value,
            password: password
          })
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Registration failed');
        }
        const data = await res.json();

        if (data.token) {
          localStorage.setItem('he_token', data.token);
          sessionStorage.setItem('justLoggedIn', '1');
        }
        const user = {
          id: data.id,
          email: data.email,
          role: data.role,
          name: data.name || data.email.split('@')[0]
        };
        localStorage.setItem('he_user', JSON.stringify(user));
        window.location.href = 'account.html';
      } catch (err) {
        alert(err.message);
      }
    });

    const showRegister = document.getElementById('showRegister');
    const showLogin = document.getElementById('showLogin');
    const loginView = document.getElementById('loginView');
    const registerView = document.getElementById('registerView');
    if (showRegister) showRegister.addEventListener('click', (e) => {
      e.preventDefault();
      loginView.style.display = 'none';
      registerView.style.display = '';
    });
    if (showLogin) showLogin.addEventListener('click', (e) => {
      e.preventDefault();
      registerView.style.display = 'none';
      loginView.style.display = '';
    });
</script>
  </body>
  </html>
